# This file was auto-generated by your CiviZen Assistant
# It deploys to Firebase Hosting on merge or push to your default branch.

name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
      - master # Supports either main or master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci || npm install
          echo "Build Time: $(date)" > public/build-timestamp.txt
          npm run build

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "${{ runner.temp }}/sa.json"

      - name: Deploy to Firebase Hosting
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: npx firebase-tools@13.29.1 deploy --only hosting --project civizen-civic-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json

      - name: Clean up credentials
        if: always()
        run: rm -f "${{ runner.temp }}/sa.json"