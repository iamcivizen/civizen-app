# This file deploys the production build to Firebase Hosting on pushes to main/master.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci || npm install
          npm run build

      - name: Validate Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP secret"
            exit 1
          fi
          python - <<'PY'
import json
import os
import sys

raw = os.environ.get("FIREBASE_SERVICE_ACCOUNT", "")
if not raw:
    print("Service account secret is empty")
    sys.exit(1)

try:
    data = json.loads(raw)
except Exception as exc:
    print(f"Service account secret is not valid JSON: {exc}")
    sys.exit(1)

required = ["type", "project_id", "private_key", "client_email"]
missing = [key for key in required if not data.get(key)]
if missing:
    print(f"Service account secret is missing required fields: {', '.join(missing)}")
    sys.exit(1)

print("Firebase service account secret is valid.")
PY

      - name: Authenticate Firebase CLI
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GITHUB_WORKSPACE/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools@13.29.1 deploy --only hosting --project civizen-civic-app --non-interactive