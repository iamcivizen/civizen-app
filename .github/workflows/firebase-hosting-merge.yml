# This file was auto-generated by your CiviZen Assistant
# It deploys to Firebase Hosting on merge or push to your default branch.

name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
      - master # Supports either main or master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci || npm install
          echo "Build Time: $(date)" > public/build-timestamp.txt
          npm run build

      - name: Validate Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP is not set in GitHub Secrets."
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import sys
          raw = os.environ['FIREBASE_SERVICE_ACCOUNT']
          try:
              data = json.loads(raw)
          except Exception as exc:
              print(f"The Firebase service account secret is not valid JSON: {exc}")
              sys.exit(1)
          required = ['type', 'project_id', 'private_key', 'client_email']
          missing = [key for key in required if not data.get(key)]
          if missing:
              print(f"The Firebase service account secret is missing required fields: {missing}")
              sys.exit(1)
          if data.get('type') != 'service_account':
              print("The Firebase service account secret does not look like a service-account JSON object.")
              sys.exit(1)
          print("Firebase service account secret format looks valid.")
          PY

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          path = Path(os.environ['RUNNER_TEMP']) / 'sa.json'
          path.write_text(os.environ['FIREBASE_SERVICE_ACCOUNT'], encoding='utf-8')
          print(path)
          PY

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          npx firebase-tools@latest hosting:channel:deploy live --project civizen-civic-app --non-interactive --only live

      - name: Clean up credentials
        if: always()
        run: rm -f "${{ runner.temp }}/sa.json"