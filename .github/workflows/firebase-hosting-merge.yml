# This file was auto-generated by your CiviZen Assistant
# It deploys to Firebase Hosting on merge or push to your default branch.

name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
      - master # Supports either main or master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci || npm install
          echo "Build Time: $(date)" > public/build-timestamp.txt
          npm run build

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "${{ runner.temp }}/sa.json"

      - name: Validate credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          jq -e '.client_email, .private_key_id, .type' "$GOOGLE_APPLICATION_CREDENTIALS" || echo "Invalid JSON"
          npx firebase-tools@13.29.1 projects:list --non-interactive
          
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            if npx firebase-tools@13.29.1 deploy --only hosting --project civizen-civic-app --non-interactive; then
              echo "Deploy succeeded."
              exit 0
            fi
            echo "Attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 10s..."
              sleep 10
            fi
          done
          echo "All attempts failed."
          exit 1

      - name: Clean up credentials
        if: always()
        run: rm -f "${{ runner.temp }}/sa.json"