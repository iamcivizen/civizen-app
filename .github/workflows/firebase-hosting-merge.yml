# This file deploys the production build to Firebase Hosting on pushes to main/master.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci || npm install
          npm run build

      - name: Validate Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP secret"
            exit 1
          fi
          node -e "const raw = process.env.FIREBASE_SERVICE_ACCOUNT || ''; if (!raw) { console.error('Service account secret is empty'); process.exit(1); } let data; try { data = JSON.parse(raw); } catch (err) { console.error('Service account secret is not valid JSON: ' + err.message); process.exit(1); } const required = ['type', 'project_id', 'private_key', 'client_email']; const missing = required.filter((key) => !data[key]); if (missing.length) { console.error('Service account secret is missing required fields: ' + missing.join(', ')); process.exit(1); } console.log('Firebase service account secret is valid.');"

      - name: Authenticate Firebase CLI
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GITHUB_WORKSPACE/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/firebase-service-account.json" >> "$GITHUB_ENV"
          export GOOGLE_APPLICATION_CREDENTIALS="$GITHUB_WORKSPACE/firebase-service-account.json"

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools@13.29.1 deploy --only hosting --project civizen-civic-app --non-interactive