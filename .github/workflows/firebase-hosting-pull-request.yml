# This file was auto-generated by your CiviZen Assistant
# It deploys preview channels on pull request.

name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    branches:
      - main
      - master
jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci || npm install
          echo "Build Time: $(date)" > public/build-timestamp.txt
          npm run build

      - name: Deploy Preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVIZEN_CIVIC_APP }}'
          projectId: civizen-civic-app
          firebaseToolsVersion: 'latest'
